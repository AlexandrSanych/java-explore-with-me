server.port=8080
spring.application.name=ewm-main-service

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/explore-with-me-main
spring.datasource.username=ewm_user
spring.datasource.password=ewm_password

spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

stats-server.url=http://stats-server:9090

logging.level.ru.practicum=DEBUG
